name: Build Workbook

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/build_workbook.py'
      - 'scripts/prompt_trial_runner.py'
      - 'requirements.txt'
      - '.github/workflows/build-workbook.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/build_workbook.py'
      - 'scripts/prompt_trial_runner.py'
      - 'requirements.txt'
      - '.github/workflows/build-workbook.yml'

jobs:
  build-workbook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build workbook
        run: python scripts/build_workbook.py

      - name: Verify workbook exists
        run: test -f workbook/group-dynamics-simulator-phase1.xlsx

      - name: Generate prompt trial artifacts
        run: python scripts/prompt_trial_runner.py

      - name: Verify prompt trial artifacts exist
        run: |
          test -f artifacts/prompt_trials/synthetic-3-person-simple.md
          test -f artifacts/prompt_trials/realistic-5-person-complex.md
          test -f artifacts/prompt_trials/determinism_report.json

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: group-dynamics-simulator-phase1
          path: workbook/group-dynamics-simulator-phase1.xlsx
          if-no-files-found: error

      - name: Upload prompt trial artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase1-prompt-trials
          path: artifacts/prompt_trials/
          if-no-files-found: error
