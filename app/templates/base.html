<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Group Dynamics Simulator{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: -.5px; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; padding-top: 1rem; }
    .sidebar .nav-link { color: #495057; border-radius: .375rem; margin-bottom: .15rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9ecef; color: #212529; }
    .sidebar .nav-link i { width: 1.4rem; }
    .main-content { padding: 1.5rem; }
    .badge-evidence { font-size: .7rem; }
    .score-badge { font-size: .75rem; min-width: 2.2rem; }
    .prompt-block { font-family: monospace; font-size: .8rem; background: #1e1e2e; color: #cdd6f4;
                    border-radius: .5rem; padding: 1rem; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
    .confidence-bar { height: 8px; border-radius: 4px; }
    dt { color: #6c757d; font-size: .85rem; font-weight: 500; }
    dd { margin-bottom: .5rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><i class="bi bi-diagram-3-fill me-2"></i>Group Dynamics Simulator</a>
      <span class="navbar-text text-secondary small">Phase 2 — personal use only · not a clinical tool</span>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar">
        <ul class="nav flex-column px-2">
          <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/"><i class="bi bi-house"></i>Dashboard</a></li>
          <li class="nav-item mt-2"><span class="text-muted small px-2 fw-bold">PEOPLE & PROFILES</span></li>
          <li class="nav-item"><a class="nav-link {% if '/people' in request.url.path %}active{% endif %}" href="/people/"><i class="bi bi-people"></i>People</a></li>
          <li class="nav-item"><a class="nav-link {% if '/relationships' in request.url.path %}active{% endif %}" href="/relationships/"><i class="bi bi-arrow-left-right"></i>Relationships</a></li>
          <li class="nav-item mt-2"><span class="text-muted small px-2 fw-bold">GROUPS & SCENARIOS</span></li>
          <li class="nav-item"><a class="nav-link {% if '/groups' in request.url.path %}active{% endif %}" href="/groups/"><i class="bi bi-collection"></i>Groups</a></li>
          <li class="nav-item"><a class="nav-link {% if '/scenarios' in request.url.path %}active{% endif %}" href="/scenarios/"><i class="bi bi-layers"></i>Scenarios</a></li>
          <li class="nav-item mt-2"><span class="text-muted small px-2 fw-bold">SIMULATION</span></li>
          <li class="nav-item"><a class="nav-link {% if '/configs' in request.url.path %}active{% endif %}" href="/configs/"><i class="bi bi-sliders"></i>Configs</a></li>
          <li class="nav-item"><a class="nav-link {% if '/simulations' in request.url.path %}active{% endif %}" href="/simulations/"><i class="bi bi-play-circle"></i>Runs</a></li>
        </ul>
      </nav>

      <main class="col-md-10 main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
